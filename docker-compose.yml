version: '3.9'

services:
  postgres:
    image: postgres:16

    container_name: linkflow-postgres

    restart: unless-stopped

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkflow

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: linkflow-redis

    ports:
      - '6379:6379'

    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management

    container_name: linkflow-rabbitmq

    ports:
      - '5672:5672'
      - '15672:15672'

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio

    container_name: linkflow-minio

    command: server /data --console-address ":9001"

    ports:
      - '9000:9000'
      - '9001:9001'

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  linkflow-network:
    driver: bridge
